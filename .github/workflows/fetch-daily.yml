name: Fetch klines daily

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-klines
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run fetch:klines

      - run: npm run update-badge

      - name: Commit + push cache updates
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .klines-cache README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): daily klines update $(date -u +%Y-%m-%d)"
            git push
          fi
          # The push (if any) triggers the "Deploy Next.js site to Pages"
          # workflow, which rebuilds and redeploys the site.
