name: Fetch klines daily

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fetch-klines
  cancel-in-progress: false

jobs:
  fetch-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Binance geo-blocks GitHub-hosted runners (HTTP 451 from US IPs).
      # Treat fetch as best-effort: if it fails, build+deploy the existing cache.
      # For real daily updates, switch to a self-hosted runner outside the US
      # or refactor fetch-klines.ts to consume https://data.binance.vision/.
      - name: Fetch latest candles (best-effort — Binance may geo-block)
        run: npm run fetch:klines
        continue-on-error: true

      - name: Commit updates
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .klines-cache
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): daily klines update $(date -u +%Y-%m-%d)"
            git push
          fi

      - run: npm run build
        env:
          BASE_PATH: /static-klines

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
